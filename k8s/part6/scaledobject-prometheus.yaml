apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: aras-demo-keda
  namespace: default
spec:
  scaleTargetRef:
    name: aras-demo-app
  minReplicaCount: 1
  maxReplicaCount: 8
  cooldownPeriod: 30
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
      metricName: container_cpu_usage
      query: sum(rate(container_cpu_usage_seconds_total{namespace="default",pod=~"aras-demo-app.*",container="whoami"}[1m]))
      threshold: "0.01"
