trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: terraform-credentials
  - name: TF_VERSION
    value: '1.15.4'
  - name: WORKING_DIR
    value: '$(System.DefaultWorkingDirectory)/terraform'

stages:

- stage: Validate
  displayName: 'Terraform Validate & Plan'
  jobs:
  - job: TerraformPlan
    displayName: 'terraform plan'
    steps:

    - task: TerraformInstaller@1
      displayName: 'Install Terraform $(TF_VERSION)'
      inputs:
        terraformVersion: $(TF_VERSION)

    - script: terraform init
      displayName: 'terraform init'
      workingDirectory: $(WORKING_DIR)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)

    - script: terraform validate
      displayName: 'terraform validate'
      workingDirectory: $(WORKING_DIR)

    - script: |
        terraform plan -out=tfplan -no-color 2>&1 | tee plan-output.txt
        echo "##vso[task.uploadfile]$(WORKING_DIR)/plan-output.txt"
      displayName: 'terraform plan'
      workingDirectory: $(WORKING_DIR)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)

    - task: PublishPipelineArtifact@1
      displayName: 'Publish terraform plan'
      inputs:
        targetPath: '$(WORKING_DIR)/tfplan'
        artifactName: 'terraform-plan'

- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: TerraformApply
    displayName: 'terraform apply'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform $(TF_VERSION)'
            inputs:
              terraformVersion: $(TF_VERSION)

          - script: terraform init
            displayName: 'terraform init'
            workingDirectory: $(WORKING_DIR)
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)

          - script: terraform apply -auto-approve
            displayName: 'terraform apply'
            workingDirectory: $(WORKING_DIR)
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
